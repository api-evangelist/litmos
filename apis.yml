aid: litmos
name: Litmos
description: SAP Litmos is a cloud-based learning management system (LMS) with a REST
  API for managing courses, learning paths, user enrollment, completions, assessments,
  and training compliance reporting. The API enables organizations to automate user
  provisioning, synchronize training data with HR and CRM systems, manage teams, and
  retrieve completion records for compliance workflows.
